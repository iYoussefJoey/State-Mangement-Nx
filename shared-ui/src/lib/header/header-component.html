<mat-toolbar>
  <div class="header__content">
    <button (click)="toggleSide.emit()">
      @if (opened()) {
      <svg lucidePanelLeftClose></svg>
      } @else {
      <svg lucidePanelRightClose></svg>
      }
    </button>
    <button (click)="themeService.toggleTheme()">
      @if (themeService.isDarkMode()){
      <svg lucideSun></svg>
      } @else {
      <svg lucideMoon></svg>
      }
    </button>
  </div>
</mat-toolbar>
